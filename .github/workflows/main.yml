name: deployement

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: setup ssh keys and permissions
        run: |
          mkdir -p ~/.ssh/
          echo "{{ secrets.SSH_PRIVATE_KEY}}" > ~/.ssh/id_rsa && chmod 660  ~/.ssh/id_rsa
      - name: pull and restart compose
        run: |
          ssh -i ~/.ssh/id_rsa {{ secrets.SSH_USER}}@{{secrets.SSH_HOST}} " cd /home/ubuntu/blankpage && git pull && docker compose restart"
