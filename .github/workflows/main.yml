name: deployement

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: setup ssh keys and permissions
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY}}
      - name: scan key
        run: ssh-keyscan -H songon.space >> ~/.ssh/known_hosts
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: songon.space
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/blankpage
            git pull
            docker compose up -d
