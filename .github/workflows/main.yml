name: deployement

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: setup ssh keys and permissions
        run: |
          mkdir -p ~/.ssh/
          echo "{{ secrets.SSH_PRIVATE_KEY}}" > ~/.ssh/id_rsa && chmod 600  ~/.ssh/id_rsa
          ssh-keyscan -H songon.space >> ~/.ssh/known_hosts
      - name: pull and restart compose
        run: |
          ssh -i ~/.ssh/id_rsa root@songon.space "cd /home/ubuntu/blankpage && git pull && docker compose restart"
