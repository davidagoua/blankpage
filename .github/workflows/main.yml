name: deployement

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: songon.space
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/blankpage
            git pull
            docker compose up -d
      - name: Checking docker status
        uses: c-schicho/SSH-Action@v1
        with:
          host: songon.space
          user: root
          port: 22
          key: ${{secrets.SSH_PRIVATE_KEY}}
          command: |
            docker compose ps
            docker compose logs

